<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
    <style>
        li { position: relative; cursor: pointer; }
        .dica { display: none; color: red; font-weight: bold; }
        li:hover .dica { display: inline; }
    </style>
</head>
<body>
    <h1>Tags em HTML</h1>
    <ul>
        <li>parágrafo <span class="dica">- use a tag &lt;p&gt;</span></li>
        <li>título <span class="dica">- use a tag &lt;h1&gt;, &lt;h2&gt;, &lt;h3&gt;...</span></li>
        <li>imagens <span class="dica">- use a tag &lt;img&gt;</span></li>
        <li>Abreviações <span class="dica">- use a tag &lt;abbr&gt;</span></li>
        <li>código fonte <span class="dica">- use a tag &lt;code&gt;</span></li>
        <li>Lista numerais <span class="dica">- use a tag &lt;ol&gt;</span></li>
        <li>Lista com demarcadores <span class="dica">- use a tag &lt;ul&gt;</span></li>
        
    </ul>
</body>
</html>
