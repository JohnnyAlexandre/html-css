<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= initial-scale=1.0">
    <title>Meu Site Testando Codigos</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Courier New', Courier, monospace;
    background-image: url("https://cdn.pixabay.com/photo/2015/04/23/22/00/tree-736885_960_720.jpg");
    background-size: cover;
    background-position: center center;
    background-attachment: fixed;   
}

.container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: auto;
}

.link li {
    display: inline-block;
    margin: 10px;
    border-radius: 15px;
    background-color: red;
    padding: 10px; 
    width: 20%;
    text-align: center;
}

.link li:hover {
    background-color: #333;
    transition: background-color 0.5s ease;
    cursor: pointer;
}

.link li a {
    text-decoration: none;
    color: white;
    font-size: 20px;
    font-weight: bold;
}

.container h1 {
    color: white;
    font-size: 30px;
    text-shadow: 2px 2px 4px #000000;
    font-weight: bold;
}

.container img {
    margin-top: 50px;
    margin-right: auto;
    margin-left: auto;
    
}

.container p {
    color: white;
    font-size: 15px;
    border-radius: 10px;
    padding: 10px;
}
    </style>
</head>
<body>
        <main>
            <nav class="link">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
            </nav>
            <div class="container">
            <section>
          
               <img src="imagens/mascote.png" alt="Mascote">
               

               <h1>Bem-vindo ao meu site!</h1>
               <p>Este é um exemplo de um site simples usando HTML, CSS. Você pode adicionar mais conteúdo aqui, como texto, imagens e links.</p>
           </section>
           </div>
        </main>
</body>
</html>
