<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: loverboy;
            src: url(LOVERBOY.TTF);format('truetype');
            font-weight: normal;
            font-style: normal;
            /*
             TIPOS DE fomart(s)
             - oppentype (otf)
             - truetype (ttf)
             -embedded opentype (eot)
             -truetype-aat (Apple Advanced Typography) (ttc)
             -svg
             */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;

        }
        h1 {
             font-family: 'loverboy', Times, serif;
             font-size: 3em;
             font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!       </h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatibus saepe doloribus modi quos quasi maiores cum sunt quod beatae aut ad inventore vero sapiente, nesciunt laborum ex placeat similique veniam.-</p>
</body>
</html>
